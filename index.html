<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تطبيق فلو | نقل الملفات</title>

    <!-- App Web App Meta Tags -->
    <meta name="theme-color" content="#111318">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="123.png">
    <link rel="apple-touch-icon" href="123.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#0f1115',
                        darkSurface: '#1a1d24',
                        darkHover: '#252932',
                        darkBorder: '#2a2e39',
                        primary: '#6366f1',
                        primaryHover: '#4f46e5',
                        textMain: '#f3f4f6',
                        textMuted: '#9ca3af',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #0f1115;
            color: #f3f4f6;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #374151;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #4b5563;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .list-card {
            transition: all 0.2s;
        }

        .list-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            border-color: #374151;
        }

        /* منطقة إسقاط الملفات */
        .dropzone {
            border: 2px dashed #2a2e39;
            transition: all 0.3s ease;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: #6366f1;
            background-color: rgba(99, 102, 241, 0.05);
        }

        /* تخصيص إخفاء شريط التمرير للبطاقات الأفقية */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="font-sans h-screen flex flex-col overflow-hidden selection:bg-primary selection:text-white text-textMain bg-darkBg">

    <!-- شاشة التحميل -->
    <div id="loading-screen"
        class="fixed inset-0 bg-darkBg z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative w-20 h-20 mb-6">
            <div class="absolute inset-0 border-4 border-darkBorder rounded-full"></div>
            <div class="absolute inset-0 border-4 border-primary rounded-full border-t-transparent animate-spin"></div>
            <i
                class="fa-solid fa-cloud-arrow-up absolute inset-0 flex items-center justify-center text-2xl text-primary animate-pulse"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-wider text-textMain">فلو للملفات</h1>
        <p class="text-textMuted text-sm mt-2">جاري مزامنة المنصة...</p>
    </div>

    <!-- نافذة إعداد الملف الشخصي (إلزامية) -->
    <div id="setup-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[90] hidden flex flex-col items-center justify-center p-4 transition-all">
        <div class="bg-darkSurface rounded-3xl p-8 max-w-sm w-full border border-darkBorder shadow-2xl fade-in">
            <div class="text-center mb-8">
                <div
                    class="w-20 h-20 bg-darkBg text-primary rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner border border-darkBorder">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h2 class="text-2xl font-bold text-textMain">منصة فلو</h2>
                <p class="text-textMuted text-sm mt-2">يجب تسجيل الدخول للإستمرار</p>
            </div>
            <div class="relative mb-4">
                <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-textMuted"></i>
                <input type="text" id="setup-name-input" placeholder="اسم المستخدم..."
                    class="w-full bg-darkBg border border-darkBorder rounded-xl pr-12 pl-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-textMain">
            </div>
            <div class="relative mb-6">
                <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-textMuted"></i>
                <input type="password" id="setup-password-input" placeholder="كلمة المرور (6 أحرف على الأقل)..."
                    class="w-full bg-darkBg border border-darkBorder rounded-xl pr-12 pl-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-textMain">
            </div>
            <button onclick="saveUserProfile()"
                class="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                <span id="auth-btn-text">دخول أو تسجيل جديد</span>
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
        </div>
    </div>

    <!-- نافذة اختيار المستلم -->
    <div id="recipient-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[80] hidden flex flex-col items-center justify-center p-4 transition-all">
        <div
            class="bg-darkSurface rounded-3xl p-6 max-w-md w-full border border-darkBorder shadow-2xl fade-in flex flex-col h-[70vh] max-h-[600px]">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-textMain">اختيار المستلم</h3>
                <button onclick="closeRecipientModal()"
                    class="w-8 h-8 flex items-center justify-center rounded-full bg-darkBg hover:bg-rose-500/20 text-textMuted hover:text-rose-400 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="relative mb-4 shrink-0">
                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-textMuted">
                    <i class="fa-solid fa-search"></i>
                </div>
                <input type="text" id="recipient-search" placeholder="ابحث عن مستخدم بالاسم..."
                    oninput="filterRecipientModalList()"
                    class="w-full bg-darkBg border border-darkBorder rounded-xl pr-10 pl-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-textMain transition-all shadow-inner text-sm">
            </div>
            <div id="modal-recipient-list" class="flex-1 overflow-y-auto pr-1 flex flex-col gap-2 hide-scrollbar">
                <!-- يتم التوليد برمجياً -->
            </div>
        </div>
    </div>

    <!-- الهيكل الرئيسي -->
    <div class="w-full h-full flex flex-col overflow-hidden relative">

        <!-- شريط التنقل العلوي -->
        <header class="w-full flex flex-col z-20 bg-darkBg border-b border-darkBorder shadow-md shrink-0">

            <!-- الصف الأول: الشعار (مع هوامش أكبر للجوال لتفادي البطارية/الشبكة) + زر تسجيل الخروج -->
            <div
                class="w-full px-4 md:px-8 pt-12 pb-3 md:pt-4 md:pb-4 bg-[#111318] border-b border-darkBorder/50 flex items-center">
                <div class="flex items-center gap-3 w-full max-w-6xl mx-auto relative">
                    <i class="fa-solid fa-folder-open text-primary text-xl md:text-2xl"></i>
                    <span class="text-primary font-black text-xl md:text-2xl tracking-widest">فلو</span>
                    <!-- الخط الممتد إلى اليسار -->
                    <div
                        class="h-[2px] bg-gradient-to-l from-primary/50 via-primary/10 to-transparent flex-1 ml-4 rounded-full">
                    </div>

                    <!-- زر تسجيل الخروج -->
                    <button onclick="logoutUser()"
                        class="w-9 h-9 flex items-center justify-center rounded-full bg-darkSurface border border-darkBorder hover:bg-rose-500/10 hover:border-rose-500/30 hover:text-rose-500 transition-all absolute left-0 shrink-0 text-textMuted shadow-sm"
                        title="تسجيل الخروج">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </div>

            <!-- الصف الثاني: البروفايل يمين + شريط الأقسام يسار/وسط -->
            <div class="w-full px-4 md:px-8 py-4 flex justify-center">
                <div class="w-full max-w-6xl flex flex-col lg:flex-row items-center gap-4 lg:gap-6">

                    <!-- زر البروفايل -->
                    <div
                        class="flex items-center gap-3 shrink-0 bg-darkSurface border border-darkBorder rounded-full py-1.5 pr-1.5 pl-5 hover:border-primary/40 transition-all shadow-sm w-full lg:w-auto justify-between lg:justify-start">
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest"
                                    class="w-10 h-10 md:w-11 md:h-11 rounded-full object-cover border-2 border-darkBorder bg-darkBg shadow-sm">
                                <div
                                    class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 border border-darkBg rounded-full">
                                </div>
                            </div>
                            <div class="text-right">
                                <h1 id="my-name-display" class="text-sm font-bold text-textMain truncate max-w-[120px]">
                                    جاري التحميل...</h1>
                                <p class="text-[10px] text-textMuted mt-0.5">حساب نشط</p>
                            </div>
                        </div>
                    </div>

                    <!-- شريط الأقسام (الكبسولة) -->
                    <div
                        class="bg-[#15181e] p-1.5 rounded-[2rem] flex flex-1 w-full border border-darkBorder relative text-xs md:text-sm font-bold shadow-inner overflow-x-auto hide-scrollbar">
                        <div id="nav-indicator"
                            class="absolute h-[calc(100%-12px)] top-1.5 w-[calc(25%-3px)] rounded-[1.5rem] transition-all duration-300 shadow bg-[#2a303c] border border-darkBorder right-1.5 z-0"
                            style="right: 1.5px;"></div>

                        <button onclick="navigate('inbox', 0)" id="tab-inbox"
                            class="nav-btn min-w-[80px] relative flex-1 py-3 z-10 text-white transition-colors text-center flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-inbox"></i> <span class="hidden sm:inline">الوارد</span>
                        </button>
                        <button onclick="navigate('outbox', 1)" id="tab-outbox"
                            class="nav-btn min-w-[80px] relative flex-1 py-3 z-10 text-textMuted transition-colors text-center flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-paper-plane"></i> <span class="hidden sm:inline">الصادر</span>
                        </button>
                        <button onclick="navigate('send', 2)" id="tab-send"
                            class="nav-btn min-w-[80px] relative flex-1 py-3 z-10 text-textMuted transition-colors text-center flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-plus-circle"></i> <span class="hidden sm:inline">إرسال</span>
                        </button>
                        <button onclick="navigate('contacts', 3)" id="tab-contacts"
                            class="nav-btn min-w-[80px] relative flex-1 py-3 z-10 text-textMuted transition-colors text-center flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-users"></i> <span class="hidden sm:inline">الدليل</span>
                        </button>
                    </div>

                </div>
            </div>
        </header>

        <!-- منطقة المحتوى الرئيسية -->
        <main class="flex-1 bg-darkBg relative w-full h-full overflow-y-auto">

            <!-- حاوية الصفحات -->
            <div class="p-4 md:p-8 max-w-6xl mx-auto h-full">

                <!-- صفحة صندوق الوارد -->
                <div id="page-inbox" class="app-page h-full w-full">
                    <div class="flex flex-col w-full h-full">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold text-textMain"><i
                                    class="fa-solid fa-inbox ml-2 text-primary"></i>صندوق الوارد</h2>
                            <span id="inbox-count"
                                class="bg-darkSurface border border-darkBorder text-textMuted text-xs font-bold px-3 py-1 rounded-full">0
                                ملفات</span>
                        </div>
                        <div id="inbox-grid" class="flex flex-col gap-3 pb-10 w-full">
                            <!-- ملفات الوارد -->
                        </div>
                    </div>
                </div>

                <!-- صفحة صندوق الصادر -->
                <div id="page-outbox" class="app-page hidden h-full w-full">
                    <div class="flex flex-col w-full h-full">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold text-textMain"><i
                                    class="fa-solid fa-paper-plane ml-2 text-primary"></i>صندوق الصادر</h2>
                            <span id="outbox-count"
                                class="bg-darkSurface border border-darkBorder text-textMuted text-xs font-bold px-3 py-1 rounded-full">0
                                ملفات</span>
                        </div>
                        <div id="outbox-grid" class="flex flex-col gap-3 pb-10 w-full">
                            <!-- ملفات الصادر -->
                        </div>
                    </div>
                </div>

                <!-- صفحة إرسال ملف -->
                <div id="page-send" class="app-page hidden h-full w-full">
                    <div class="flex flex-col h-full max-w-3xl mx-auto w-full">
                        <div class="text-center mb-8 fade-in shrink-0">
                            <h2
                                class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-l from-indigo-400 to-purple-400">
                                إرسال ملف جديد</h2>
                            <p class="text-textMuted text-sm mt-2 font-medium">اختر المستلم وارفع الملف (حتى 100
                                ميجابايت).</p>
                        </div>

                        <div
                            class="fade-in bg-darkSurface border border-darkBorder rounded-3xl p-5 md:p-8 shadow-2xl flex flex-col relative overflow-hidden w-full">
                            <div
                                class="absolute bottom-0 left-0 w-64 h-64 bg-emerald-500/5 rounded-full blur-3xl -translate-x-32 translate-y-32 pointer-events-none">
                            </div>
                            <div
                                class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl translate-x-32 -translate-y-32 pointer-events-none">
                            </div>

                            <input type="file" id="file-upload-input" class="hidden"
                                onchange="handleFileSelection(event)"
                                accept="image/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.zip,.rar">

                            <div id="dropzone" onclick="document.getElementById('file-upload-input').click()"
                                class="dropzone rounded-2xl p-8 flex flex-col items-center justify-center cursor-pointer bg-darkBg/50 border-2 border-dashed border-darkBorder hover:border-emerald-500/40 hover:bg-emerald-500/5 transition-all group relative z-10 mb-6 min-h-[250px] w-full">
                                <div id="file-preview-area"
                                    class="text-center w-full flex flex-col items-center transition-transform group-hover:scale-105">
                                    <div
                                        class="w-20 h-20 bg-darkSurface rounded-full flex items-center justify-center text-4xl text-emerald-400 mb-4 border-2 border-darkBg shadow-lg relative">
                                        <i class="fa-solid fa-cloud-arrow-up"></i>
                                    </div>
                                    <p class="text-textMain font-bold text-lg mb-1" id="file-name-display">اضغط هنا أو
                                        اسحب الملف</p>
                                    <div class="flex items-center gap-2 text-textMuted text-sm mt-2">
                                        <span
                                            class="bg-darkSurface px-3 py-1 rounded-md border border-darkBorder text-emerald-400/80">الحد
                                            الأقصى 100MB</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-4 relative z-10 w-full">
                                <input type="hidden" id="selected-recipient-id">

                                <button id="btn-open-recipient-modal" onclick="openRecipientModal()"
                                    class="flex-1 bg-darkBg border-2 border-darkBorder hover:border-primary/50 text-textMain font-bold py-4 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-3 min-h-[60px]">
                                    <i class="fa-solid fa-user-plus text-primary text-xl"></i>
                                    <span id="recipient-btn-text" class="truncate">اختيار المستلم</span>
                                </button>

                                <button onclick="submitTransfer()" id="btn-submit-transfer" disabled
                                    class="flex-[2] relative overflow-hidden bg-gradient-to-l from-primary to-indigo-600 hover:from-primaryHover hover:to-indigo-700 disabled:from-darkSurface disabled:to-darkSurface disabled:text-textMuted disabled:border disabled:border-darkBorder disabled:cursor-not-allowed text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-primary/20 disabled:shadow-none min-h-[60px] group">
                                    <div id="upload-progress-bar"
                                        class="absolute top-0 right-0 bottom-0 bg-emerald-500 w-0 transition-all duration-300 z-0">
                                    </div>
                                    <div
                                        class="relative z-10 flex items-center justify-center gap-3 w-full h-full text-lg">
                                        <i id="btn-submit-icon"
                                            class="fa-solid fa-paper-plane group-hover:-translate-x-1 group-disabled:translate-x-0 transition-transform"></i>
                                        <span id="btn-submit-text">إرسال الملف الآن</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- صفحة جهات الاتصال -->
                <div id="page-contacts" class="app-page hidden h-full w-full">
                    <div class="flex flex-col w-full h-full">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold text-textMain"><i
                                    class="fa-solid fa-users ml-2 text-primary"></i>دليل المستخدمين</h2>
                            <div class="relative w-48 md:w-64">
                                <input type="text" id="contacts-search-input" oninput="renderContactsPage()"
                                    placeholder="بحث..."
                                    class="w-full bg-darkSurface border border-darkBorder rounded-full py-2 pr-10 pl-4 text-sm focus:border-primary outline-none text-textMain">
                                <i
                                    class="fa-solid fa-search absolute right-4 top-1/2 -translate-y-1/2 text-textMuted text-xs"></i>
                            </div>
                        </div>
                        <div id="contacts-page-grid" class="flex flex-col gap-3 pb-10 w-full">
                            <!-- جهات الاتصال -->
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Firebase و JavaScript -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGweaizMqsiPNXwmVyuk7N96JIQP_UGgU",
            authDomain: "new1-9f048.firebaseapp.com",
            databaseURL: "https://new1-9f048-default-rtdb.firebaseio.com",
            projectId: "new1-9f048",
            messagingSenderId: "1055568035335",
            appId: "1:1055568035335:web:16ebe1adc33ba868d3b4a2",
            measurementId: "G-CSMBXW33NX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myUser = null;
        let usersData = [];
        let transfersData = [];
        let currentPage = 'inbox';
        let selectedFile = null;

        const USERS_PATH = 'users';
        const MESSAGES_PATH = 'messages';

        // 1. التهيئة 
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById('loading-screen');
            const setupModal = document.getElementById('setup-modal');

            if (user) {
                try {
                    const userRef = doc(db, USERS_PATH, user.uid);
                    const userSnap = await getDoc(userRef);

                    loading.classList.add('opacity-0', 'pointer-events-none');
                    setupModal.classList.add('hidden');

                    if (userSnap.exists()) {
                        myUser = { ...userSnap.data(), uid: user.uid };
                        updateMyProfileUI();
                        startDataListeners();
                    } else {
                        setupModal.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("Firebase connection error:", error);
                    loading.innerHTML = `
                        <div class="relative w-20 h-20 mb-6 flex items-center justify-center mx-auto">
                            <i class="fa-solid fa-wifi text-5xl text-rose-500 opacity-80"></i>
                        </div>
                        <h1 class="text-2xl font-bold tracking-wider text-rose-400">تعذر الاتصال بالخادم</h1>
                        <button onclick="window.location.reload()" class="mt-8 px-8 py-3 bg-darkSurface border border-darkBorder hover:border-rose-500/50 hover:text-rose-400 text-textMain font-bold rounded-xl transition-colors shadow-lg">إعادة تحميل الصفحة</button>
                    `;
                }
            } else {
                loading.classList.add('opacity-0', 'pointer-events-none');
                setupModal.classList.remove('hidden'); // إلزامي تسجيل الدخول
            }
        });

        // تسجيل الخروج
        window.logoutUser = () => {
            signOut(auth).catch((error) => {
                alert("حدث خطأ أثناء تسجيل الخروج");
            });
        };

        // 2. إعداد الحساب
        window.saveUserProfile = async () => {
            const nameInput = document.getElementById('setup-name-input').value.trim();
            const passInput = document.getElementById('setup-password-input').value;

            if (!nameInput) return alert('يرجى كتابة اسمك');
            if (!passInput || passInput.length < 6) return alert('يرجى إدخال كلمة مرور تتكون من 6 أحرف أو أرقام على الأقل');

            const hexName = Array.from(nameInput.toLowerCase()).map(c => c.charCodeAt(0).toString(16)).join('');
            const syntheticEmail = `u_${hexName}@flow.local`;

            const btnText = document.getElementById('auth-btn-text');
            const originalText = btnText.innerText;
            btnText.innerText = 'جاري التحقق...';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, syntheticEmail, passInput);
                const user = userCredential.user;

                const seed = Math.random().toString(36).substring(7);
                const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}&backgroundColor=6366f1`;

                const newUserData = { name: nameInput, avatar: avatarUrl, timestamp: serverTimestamp() };
                await setDoc(doc(db, USERS_PATH, user.uid), newUserData);
            } catch (err) {
                if (err.code === 'auth/email-already-in-use') {
                    try {
                        await signInWithEmailAndPassword(auth, syntheticEmail, passInput);
                    } catch (signErr) {
                        alert('هذا الاسم مسجل مسبقاً! كلمة المرور خاطئة.');
                    }
                } else {
                    alert('حدث خطأ: ' + err.message);
                }
            } finally {
                btnText.innerText = originalText;
            }
        };

        function updateMyProfileUI() {
            document.getElementById('my-avatar').src = myUser.avatar;
            document.getElementById('my-name-display').textContent = myUser.name;
        }

        // 3. التنقل
        window.navigate = (pageId, index) => {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-white');
                btn.classList.add('text-textMuted');
            });
            const activeBtn = document.getElementById(`tab-${pageId}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-textMuted');
                activeBtn.classList.add('text-white');
            }

            const indicator = document.getElementById('nav-indicator');
            if (index !== undefined) {
                indicator.style.right = `calc(${index * 25}% + 1.5px)`;
            }

            document.querySelectorAll('.app-page').forEach(page => {
                page.classList.add('hidden');
                page.classList.remove('block');
            });

            const targetPage = document.getElementById(`page-${pageId}`);
            targetPage.classList.remove('hidden');
            targetPage.classList.add('block');

            currentPage = pageId;

            if (pageId === 'inbox' || pageId === 'outbox') renderFilesGrid();
            if (pageId === 'contacts') renderContactsPage();
        };

        // 4. جلب البيانات
        function startDataListeners() {
            if (!myUser) return;

            onSnapshot(collection(db, USERS_PATH), (snapshot) => {
                usersData = [];
                snapshot.forEach(doc => {
                    if (doc.id !== myUser.uid) usersData.push({ ...doc.data(), uid: doc.id });
                });
                if (currentPage === 'contacts') renderContactsPage();
                if (!document.getElementById('recipient-modal').classList.contains('hidden')) {
                    renderRecipientModalList();
                }
            });

            onSnapshot(collection(db, MESSAGES_PATH), (snapshot) => {
                transfersData = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.type === 'image' || data.type === 'file' || data.type === 'file_chunked') {
                        transfersData.push({ ...data, id: doc.id });
                    }
                });
                transfersData.sort((a, b) => {
                    const tA = a.timestamp ? a.timestamp.toMillis() : Date.now();
                    const tB = b.timestamp ? b.timestamp.toMillis() : Date.now();
                    return tB - tA;
                });
                if (currentPage === 'inbox' || currentPage === 'outbox') renderFilesGrid();
            });
        }

        // 5. عرض الملفات (بالتصميم الأفقي المطابق للصورة للجوال والديسكتوب)
        function renderFilesGrid() {
            const isInbox = currentPage === 'inbox';
            const gridId = isInbox ? 'inbox-grid' : 'outbox-grid';
            const countId = isInbox ? 'inbox-count' : 'outbox-count';
            const container = document.getElementById(gridId);
            if (!container) return;
            container.innerHTML = '';

            const filesToShow = transfersData.filter(f =>
                isInbox ? f.receiverId === myUser.uid : f.senderId === myUser.uid
            );

            document.getElementById(countId).textContent = `${filesToShow.length} ملفات`;

            if (filesToShow.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-textMuted text-center w-full">
                        <i class="fa-solid fa-folder-open text-6xl mb-4 opacity-20"></i>
                        <p class="text-lg">لا توجد ملفات ${isInbox ? 'واردة' : 'صادرة'} بعد.</p>
                    </div>`;
                return;
            }

            filesToShow.forEach(file => {
                const otherUserId = isInbox ? file.senderId : file.receiverId;
                const otherUser = usersData.find(u => u.uid === otherUserId) || { name: 'مستخدم محذوف', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=G' };

                let timeStr = '';
                if (file.timestamp) {
                    timeStr = file.timestamp.toDate().toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                }

                let iconHtml = '';
                let fileNameDisplay = file.fileName || 'صورة مرفقة';
                let fileSizeDisplay = file.fileSize || 'مضغوطة';
                let actionHtml = '';

                if (file.type === 'image') {
                    iconHtml = `<div class="w-10 h-10 md:w-12 md:h-12 bg-[#1a2332] text-blue-400 rounded-xl flex items-center justify-center text-lg md:text-xl shrink-0"><i class="fa-solid fa-image"></i></div>`;
                    actionHtml = `<a href="${file.fileUrl}" download="image.jpg" class="bg-[#1e1b2e] hover:bg-[#2a2640] border border-[#3b3559] text-[#818cf8] text-xs md:text-sm font-bold py-2 px-4 md:py-2.5 md:px-6 rounded-xl transition-colors flex items-center justify-center gap-2 whitespace-nowrap"><i class="fa-solid fa-download"></i> تحميل</a>`;
                } else if (file.type === 'file_chunked') {
                    iconHtml = `<div class="w-10 h-10 md:w-12 md:h-12 bg-[#172621] text-[#22c55e] rounded-xl flex items-center justify-center text-lg md:text-xl shrink-0"><i class="fa-solid fa-file-lines"></i></div>`;
                    actionHtml = `<button id="dl-btn-${file.id}" onclick="downloadChunkedFile('${file.id}', '${fileNameDisplay}')" class="bg-[#1e1b2e] hover:bg-[#2a2640] border border-[#3b3559] text-[#818cf8] text-xs md:text-sm font-bold py-2 px-4 md:py-2.5 md:px-6 rounded-xl transition-all flex items-center justify-center gap-2 whitespace-nowrap"><i class="fa-solid fa-download"></i> تحميل</button>`;
                }

                // تصميم متجاوب (Responsive) يطوى بذكاء في الجوال ويظهر كخط واحد في الديسكتوب
                const cardHtml = `
                    <div class="list-card w-full bg-[#1a1d24] border border-[#2a2e39] rounded-2xl p-3 md:p-4 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-3 md:gap-4 overflow-hidden">
                        
                        <!-- معلومات الملف (جهة اليمين) -->
                        <div class="flex items-center gap-3 w-full lg:w-auto flex-1 min-w-0">
                            ${iconHtml}
                            <div class="flex flex-col gap-1 min-w-0 flex-1">
                                <h4 class="font-bold text-textMain text-sm md:text-base truncate w-full" title="${fileNameDisplay}">${fileNameDisplay}</h4>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-medium text-textMuted bg-darkBg px-2 py-0.5 rounded-md border border-darkBorder self-start">${fileSizeDisplay}</span>
                                    <span class="text-[10px] text-textMuted lg:hidden">${timeStr}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- القسم السفلي في الجوال / الأيسر في الديسكتوب -->
                        <div class="flex items-center justify-between w-full lg:w-auto gap-3 pt-2 lg:pt-0 border-t lg:border-0 border-darkBorder/50 shrink-0">
                            
                            <!-- صورة واسم المستخدم -->
                            <div class="flex items-center gap-2 md:gap-3 w-1/2 lg:w-auto">
                                <img src="${otherUser.avatar}" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-darkBorder bg-darkBg shrink-0">
                                <div class="flex flex-col min-w-0">
                                    <p class="text-[9px] md:text-[10px] text-textMuted hidden md:block">${isInbox ? 'مُرسل من:' : 'مُرسل إلى:'}</p>
                                    <p class="text-xs font-bold text-textMain truncate max-w-[90px] md:max-w-[120px]">${otherUser.name}</p>
                                </div>
                            </div>
                            
                            <!-- التاريخ (يظهر في المنتصف في الشاشات الكبيرة) -->
                            <div class="hidden lg:block w-[120px] text-center shrink-0">
                                <p class="text-[11px] text-textMuted leading-relaxed">${timeStr.replace(', ', '<br>')}</p>
                            </div>
                            
                            <!-- زر التحميل (دائماً مرئي) -->
                            <div class="shrink-0 flex justify-end w-1/2 lg:w-auto">
                                ${actionHtml}
                            </div>

                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 6. النافذة المنبثقة لاختيار المستلم
        window.openRecipientModal = () => {
            document.getElementById('recipient-modal').classList.remove('hidden');
            document.getElementById('recipient-modal').classList.add('flex');
            document.getElementById('recipient-search').value = '';
            renderRecipientModalList();
        };

        window.closeRecipientModal = () => {
            document.getElementById('recipient-modal').classList.add('hidden');
            document.getElementById('recipient-modal').classList.remove('flex');
        };

        window.filterRecipientModalList = () => {
            renderRecipientModalList();
        };

        function renderRecipientModalList() {
            const searchQ = document.getElementById('recipient-search').value.toLowerCase();
            const list = document.getElementById('modal-recipient-list');
            if (!list) return;
            list.innerHTML = '';

            const filtered = usersData.filter(u => u.name && u.name.toLowerCase().includes(searchQ));

            if (filtered.length === 0) {
                list.innerHTML = `<p class="text-sm text-textMuted text-center py-10 w-full">لا يوجد مستخدم بهذا الاسم</p>`;
                return;
            }

            const currentSelectedId = document.getElementById('selected-recipient-id').value;

            filtered.forEach(u => {
                const isSelected = currentSelectedId === u.uid;
                const html = `
                    <div onclick="selectRecipient('${u.uid}', '${u.name}', '${u.avatar}')" 
                        class="cursor-pointer flex items-center gap-3 p-3 rounded-xl border ${isSelected ? 'border-primary bg-primary/10 shadow-md' : 'border-darkBorder bg-darkBg hover:bg-darkHover hover:border-textMuted/30'} transition-all group shrink-0">
                        <img src="${u.avatar}" class="w-10 h-10 rounded-full bg-darkBg border-2 ${isSelected ? 'border-primary' : 'border-darkBorder group-hover:border-textMuted/50'} transition-colors">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold ${isSelected ? 'text-primary' : 'text-textMain'} truncate">${u.name}</h4>
                        </div>
                        ${isSelected ? `<i class="fa-solid fa-circle-check text-primary text-lg fade-in"></i>` : `<i class="fa-solid fa-chevron-left text-textMuted text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>`}
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        window.selectRecipient = (uid, name, avatarUrl) => {
            document.getElementById('selected-recipient-id').value = uid;
            const btnText = document.getElementById('recipient-btn-text');
            btnText.innerHTML = `
                <div class="flex items-center gap-2">
                    <img src="${avatarUrl}" class="w-6 h-6 rounded-full border border-darkBorder">
                    <span class="truncate max-w-[100px] text-sm">${name}</span>
                </div>
            `;
            closeRecipientModal();
            checkSendReady();
        };

        window.selectRecipientAndGo = (uid, name, avatarUrl) => {
            selectRecipient(uid, name, avatarUrl);
            navigate('send', 2);
        };

        // 7. معالجة الملفات والرفع
        window.handleFileSelection = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const maxSize = 100 * 1024 * 1024;
            if (file.size > maxSize) {
                alert("الحد الأقصى للملف هو 100 ميجابايت.");
                e.target.value = '';
                return;
            }

            selectedFile = file;
            let sizeStr = file.size < 1024 * 1024 ? (file.size / 1024).toFixed(1) + ' KB' : (file.size / (1024 * 1024)).toFixed(2) + ' MB';

            const isImage = file.type.startsWith('image/');
            const iconHtml = isImage ? `<i class="fa-solid fa-image text-blue-400"></i>` : `<i class="fa-solid fa-file-lines text-emerald-400"></i>`;

            document.getElementById('file-preview-area').innerHTML = `
                <div class="w-16 h-16 bg-darkSurface rounded-full flex items-center justify-center text-3xl mx-auto mb-4 border border-darkBorder shadow-md relative group-hover:-translate-y-1 transition-transform">
                    ${iconHtml}
                    <div class="absolute -top-1 -right-1 w-6 h-6 bg-emerald-500 rounded-full border-2 border-darkSurface flex items-center justify-center text-white text-[10px]">
                        <i class="fa-solid fa-check"></i>
                    </div>
                </div>
                <p class="text-textMain font-bold mb-1 truncate px-4 w-full max-w-[250px] text-center text-sm md:text-base" dir="ltr">${file.name}</p>
                <p class="text-textMuted text-xs text-center font-bold mb-4 bg-darkBg px-2 py-1 rounded border border-darkBorder">${sizeStr}</p>
                
                <button id="btn-delete-file" onclick="clearFileSelection(event)" class="text-xs font-bold bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 py-2.5 px-6 rounded-xl transition-colors shrink-0 flex items-center justify-center gap-2 mx-auto border border-rose-500/20 z-20 relative">
                    <i class="fa-solid fa-trash"></i> إزالة الملف
                </button>
            `;
            checkSendReady();
        };

        window.clearFileSelection = (e) => {
            if (e && e.stopPropagation) e.stopPropagation();
            selectedFile = null;
            document.getElementById('file-upload-input').value = '';
            document.getElementById('file-preview-area').innerHTML = `
                <div class="w-20 h-20 bg-darkSurface rounded-full flex items-center justify-center text-4xl text-emerald-400 mb-4 border-2 border-darkBg shadow-lg relative group-hover:-translate-y-1 transition-transform">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <p class="text-textMain font-bold text-lg mb-1">اضغط هنا أو اسحب الملف</p>
                <div class="flex items-center gap-2 text-textMuted text-sm mt-2">
                    <span class="bg-darkSurface px-3 py-1 rounded-md border border-darkBorder text-emerald-400/80">الحد الأقصى 100MB</span>
                </div>
            `;
            checkSendReady();
        };

        function checkSendReady() {
            const recipientId = document.getElementById('selected-recipient-id').value;
            const btn = document.getElementById('btn-submit-transfer');
            if (recipientId && selectedFile) {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
        }

        function compressImage(base64Str, callback) {
            const img = new Image();
            img.src = base64Str;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width; let height = img.height; const MAX_SIZE = 1200;
                if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.8));
            };
        }

        // تسريع رفع الملفات عبر الرفع المتزامن (Concurrent Batching)
        window.submitTransfer = async () => {
            const recipientId = document.getElementById('selected-recipient-id').value;
            if (!recipientId || !selectedFile || !myUser) return;

            const btn = document.getElementById('btn-submit-transfer');
            const btnIcon = document.getElementById('btn-submit-icon');
            const btnText = document.getElementById('btn-submit-text');
            const progressBar = document.getElementById('upload-progress-bar');

            const deleteBtn = document.getElementById('btn-delete-file');
            const dropzone = document.getElementById('dropzone');
            const chooseUserBtn = document.getElementById('btn-open-recipient-modal');

            if (deleteBtn) deleteBtn.style.display = 'none';
            dropzone.style.pointerEvents = 'none';
            chooseUserBtn.style.pointerEvents = 'none';
            chooseUserBtn.classList.add('opacity-50');

            btn.setAttribute('disabled', 'true');
            btnIcon.className = 'fa-solid fa-spinner fa-spin';
            btnText.innerText = 'جاري التجهيز...';
            progressBar.style.width = '2%';

            const file = selectedFile;
            const isImage = file.type.startsWith('image/');
            const reader = new FileReader();

            reader.onload = async function (e) {
                try {
                    if (isImage) {
                        btnText.innerText = 'جاري ضغط ورفع الصورة...';
                        let simProgress = 10;
                        const simInterval = setInterval(() => {
                            simProgress += 10;
                            if (simProgress > 90) clearInterval(simInterval);
                            progressBar.style.width = simProgress + '%';
                            btnText.innerText = `${simProgress}%`;
                        }, 150);

                        compressImage(e.target.result, async (compressedBase64) => {
                            await addDoc(collection(db, MESSAGES_PATH), {
                                senderId: myUser.uid, receiverId: recipientId,
                                type: 'image', fileUrl: compressedBase64, timestamp: serverTimestamp()
                            });
                            clearInterval(simInterval);
                            progressBar.style.width = '100%';
                            btnText.innerText = 'اكتمل بنجاح!';
                            btnIcon.className = 'fa-solid fa-check';
                            setTimeout(finishTransfer, 800);
                        });
                    } else {
                        const base64File = e.target.result;
                        let sizeStr = file.size < 1024 * 1024 ? (file.size / 1024).toFixed(1) + ' KB' : (file.size / (1024 * 1024)).toFixed(2) + ' MB';

                        const msgRef = await addDoc(collection(db, MESSAGES_PATH), {
                            senderId: myUser.uid, receiverId: recipientId,
                            type: 'file_chunked', fileName: file.name, fileSize: sizeStr, timestamp: serverTimestamp()
                        });

                        const chunkSize = 800000; // حجم الدفعة
                        const totalChunks = Math.ceil(base64File.length / chunkSize);
                        let chunksUploaded = 0;
                        const concurrencyLimit = 5; // رفع 5 أجزاء في نفس الوقت لتسريع العملية

                        for (let i = 0; i < totalChunks; i += concurrencyLimit) {
                            const batch = [];
                            for (let j = i; j < i + concurrencyLimit && j < totalChunks; j++) {
                                const chunkData = base64File.substring(j * chunkSize, (j + 1) * chunkSize);
                                const uploadPromise = setDoc(doc(db, MESSAGES_PATH, msgRef.id, 'chunks', String(j)), { data: chunkData })
                                    .then(() => {
                                        chunksUploaded++;
                                        const currentPercentage = Math.round((chunksUploaded / totalChunks) * 100);
                                        progressBar.style.width = currentPercentage + '%';
                                        btnText.innerText = `جاري الرفع... ${currentPercentage}%`;
                                    });
                                batch.push(uploadPromise);
                            }
                            await Promise.all(batch); // انتظار اكتمال الـ 5 دفعات
                        }

                        progressBar.style.width = '100%';
                        btnText.innerText = 'اكتمل بنجاح!';
                        btnIcon.className = 'fa-solid fa-check';
                        setTimeout(finishTransfer, 800);
                    }
                } catch (err) {
                    alert("حدث خطأ أثناء الرفع. تحقق من اتصالك.");
                    resetSendUI();
                }
            };
            reader.readAsDataURL(file);
        };

        function resetSendUI() {
            const btnText = document.getElementById('btn-submit-text');
            const btnIcon = document.getElementById('btn-submit-icon');
            const progressBar = document.getElementById('upload-progress-bar');
            const deleteBtn = document.getElementById('btn-delete-file');
            const dropzone = document.getElementById('dropzone');
            const chooseUserBtn = document.getElementById('btn-open-recipient-modal');

            if (deleteBtn) deleteBtn.style.display = 'flex';
            dropzone.style.pointerEvents = 'auto';
            chooseUserBtn.style.pointerEvents = 'auto';
            chooseUserBtn.classList.remove('opacity-50');

            progressBar.style.width = '0%';
            btnIcon.className = 'fa-solid fa-paper-plane';
            btnText.innerText = 'إرسال الملف الآن';
            checkSendReady();
        }

        function finishTransfer() {
            document.getElementById('selected-recipient-id').value = '';
            document.getElementById('recipient-btn-text').innerText = 'اختيار المستلم';
            window.clearFileSelection();
            resetSendUI();
            navigate('outbox', 1);
        }

        window.downloadChunkedFile = async (msgId, fileName) => {
            const btn = document.getElementById(`dl-btn-${msgId}`);
            const originalHtml = btn.innerHTML;
            if (btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> تحميل...';

            try {
                const chunksRef = collection(db, MESSAGES_PATH, msgId, 'chunks');
                const snap = await getDocs(chunksRef);

                if (snap.empty) {
                    alert('الملف غير مكتمل أو تالف.');
                    if (btn) btn.innerHTML = originalHtml;
                    return;
                }

                let chunksArray = [];
                snap.forEach(doc => { chunksArray[parseInt(doc.id)] = doc.data().data; });
                const fullBase64 = chunksArray.join('');

                const a = document.createElement('a');
                a.href = fullBase64; a.download = fileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            } catch (error) {
                alert('خطأ أثناء التنزيل.');
            } finally {
                if (btn) btn.innerHTML = originalHtml;
            }
        };

        // 8. دليل المستخدمين
        window.renderContactsPage = () => {
            if (currentPage !== 'contacts') return;
            const container = document.getElementById('contacts-page-grid');
            if (!container) return;
            const searchQ = document.getElementById('contacts-search-input').value.toLowerCase();
            container.innerHTML = '';

            const filtered = usersData.filter(u => u.name && u.name.toLowerCase().includes(searchQ));

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-textMuted py-10 w-full">لا توجد جهات اتصال.</p>`;
                return;
            }

            filtered.forEach(u => {
                const html = `
                    <div class="list-card w-full bg-[#1a1d24] border border-[#2a2e39] rounded-2xl p-3 md:p-4 flex flex-row items-center justify-between gap-3 md:gap-4 overflow-hidden">
                        <div class="flex items-center gap-3 md:gap-4 flex-1 min-w-0">
                            <img src="${u.avatar}" class="w-10 h-10 md:w-12 md:h-12 rounded-full border border-darkBorder bg-darkBg shrink-0">
                            <div class="min-w-0">
                                <h3 class="font-bold text-textMain text-sm md:text-base truncate">${u.name}</h3>
                                <p class="text-[10px] md:text-xs text-textMuted mt-0.5">مستخدم فلو</p>
                            </div>
                        </div>

                        <button onclick="selectRecipientAndGo('${u.uid}', '${u.name}', '${u.avatar}')" 
                            class="shrink-0 bg-darkBg border border-darkBorder hover:bg-primary/20 hover:text-primary hover:border-primary text-textMuted text-xs md:text-sm font-bold py-2 md:py-2.5 px-4 md:px-6 rounded-xl transition-all whitespace-nowrap flex items-center justify-center gap-2">
                            <i class="fa-solid fa-paper-plane text-xs"></i> <span class="hidden sm:inline">إرسال</span>
                        </button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        };

        const dropzone = document.getElementById('dropzone');
        if (dropzone) {
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (dropzone.style.pointerEvents !== 'none') dropzone.classList.add('dragover');
            });
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                if (dropzone.style.pointerEvents === 'none') return;
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const fileInput = document.getElementById('file-upload-input');
                    fileInput.files = e.dataTransfer.files;
                    window.handleFileSelection({ target: fileInput });
                }
            });
        }
    </script>
</body>

</html>
